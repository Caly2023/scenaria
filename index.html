<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>ScénarIA — Professional Screenwriting Studio</title>
    <meta name="description" content="Studio d'écriture de scénario professionnel propulsé par l'IA. De l'idée au script, en 9 étapes." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScénarIA" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <style>
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      #splash-screen {
        background-color: #0f0f0f;
        height: 100dvh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      .orbit-container {
        position: absolute;
        width: 200px;
        height: 200px;
        animation: orbit 2s linear infinite;
      }
      @media (min-width: 640px) {
        .orbit-container { width: 240px; height: 240px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash-screen">
        <div style="position: relative; display: flex; align-items: center; justify-content: center;">
          <!-- Moving Comet Orbit -->
          <div class="orbit-container">
             <div style="position: absolute; inset: 0; border-radius: 50%; 
                         background: conic-gradient(from 0deg, #D4AF37 0%, transparent 40%); 
                         mask-image: radial-gradient(circle, transparent 48%, black 48.5%, black 50%, transparent 50.5%); 
                         -webkit-mask-image: radial-gradient(circle, transparent 48%, black 48.5%, black 50%, transparent 50.5%); 
                         opacity: 0.8;"></div>
             <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
                         width: 8px; height: 8px; background-color: #D4AF37; 
                         border-radius: 50%; box-shadow: 0 0 15px 4px rgba(212, 175, 55, 0.6);"></div>
          </div>
          <!-- Central Logo -->
          <div style="position: relative; z-index: 20; width: 80px; height: 80px; 
                      background-color: #212121; border-radius: 28px; 
                      border: 1px solid rgba(255,255,255,0.1); overflow: hidden; 
                      display: flex; align-items: center; justify-content: center; 
                      box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
             <img src="/logo.png" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9;" alt="ScénarIA">
          </div>
        </div>
        <!-- Text Content -->
        <div style="margin-top: 48px; text-align: center;">
          <h2 style="color: white; font-weight: bold; letter-spacing: 0.3em; text-transform: uppercase; margin: 0; font-size: 1.25rem;">Scénar<span style="color: #D4AF37;">IA</span></h2>
          <p style="color: rgba(255,255,255,0.3); font-weight: bold; text-transform: uppercase; letter-spacing: 0.4em; font-size: 9px; margin-top: 14px;">L'IA au service de votre imagination</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
